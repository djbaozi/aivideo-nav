{% extends "admin/base.html" %}
{% block title %}登录{% endblock %}
{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="text-center mb-4">
            <h2><i class="bi bi-compass fs-1" style="color: #8B5CF6;"></i></h2>
            <h4>djbaozi 后台管理</h4>
            <p class="text-muted">请登录以继续</p>
        </div>
        <form method="post">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100" style="background: linear-gradient(135deg, #8B5CF6, #06B6D4); border: none;">
                <i class="bi bi-box-arrow-in-right"></i> 登录
            </button>
        </form>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="mt-3">
            {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'error' else category }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
    </div>
</div>
<style>
.login-page { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0A0A0F; }
.login-card { background: #13131E; border: 1px solid rgba(139,92,246,0.2); border-radius: 16px; padding: 40px; width: 380px; }
.login-card h4 { color: #F1F1F6; }
.login-card p { color: #8A8A9E; }
.form-control { background: #1A1A2E; border: 1px solid rgba(139,92,246,0.15); color: #F1F1F6; }
.form-control:focus { background: #1A1A2E; border-color: #8B5CF6; color: #F1F1F6; box-shadow: 0 0 0 0.25rem rgba(139,92,246,0.25); }
.form-label { color: #8A8A9E; }
</style>
{% endblock %}
