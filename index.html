            <div class="footer">
                <div class="rating">
                    ★ ${t.rating} <span>(${t.reviews}评)</span>
                </div>
                <a href="${t.url}" target="_blank" class="visit-btn" onclick="event.stopPropagation()">访问 →</a>
            </div>
        </div>
    `).join('');
}

function filterByCategory(cat) {
    currentCategory = cat;
    document.querySelectorAll('.filters button').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
    renderTools();
}

function filterTools() {
    currentSearch = document.getElementById('searchInput').value.toLowerCase();
    renderTools();
}

renderTools();
</script>
</body>
</html>
